<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Project</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <!-- TESTING Input for custom filename -->
    <div class="filename-container">
      <input
        type="text"
        id="filenameInput"
        placeholder="Enter first and last name"
      />
    </div>

    <div class="camera-wrapper">
      <div class="camera effect">
        <!-- adding video camera container -->
        <video class="video"></video>

        <div class="camera-button">
          <!-- camera icon shutter -->
          <ion-icon name="camera-outline"></ion-icon>
        </div>
      </div>

      <!-- Canvas for capturing images -->
      <canvas class="canvas" width="500" height="400"></canvas>

      <!-- Countdown display -->
      <div class="countdown" id="countdown"></div>

      <!-- Review Image -->
      <div class="review-container" id="reviewContainer" style="display: none">
        <img id="reviewImage" src="" alt="Captured photo" />
        <div class="button-group">
          <button id="approveBtn">Approve &amp; Download</button>
          <button id="retakeBtn">Reject &amp; Retake</button>
        </div>
      </div>
    </div>

    <!-- Link to js -->
    <script src="java.js"></script>
    <script>
      // Restore filename from sessionStorage if available (from retake) //
      document.addEventListener("DOMContentLoaded", () => {
        const storedFilename = sessionStorage.getItem("capturedFilename");
        if (storedFilename) {
          document.getElementById("filenameInput").value = storedFilename;
        }
      });
    </script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
